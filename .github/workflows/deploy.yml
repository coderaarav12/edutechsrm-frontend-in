name: Deploy Frontend (.in)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy_in:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Wrangler whoami (sanity check)
        run: npx wrangler whoami
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN_IN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID_IN }}
      - name: Deploy .in worker
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN_IN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID_IN }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
          NEXT_PUBLIC_AI_BACKEND_URL: ${{ secrets.NEXT_PUBLIC_AI_BACKEND_URL }}
      - name: Set backend URL secrets
        run: |
          echo "${{ secrets.SRM_BACKEND_URL }}" | npx wrangler secret put SRM_BACKEND_URL
          echo "${{ secrets.BACKEND_URL }}" | npx wrangler secret put BACKEND_URL
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN_IN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID_IN }}



